<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>VIP Tool Store | Thanh Duong Dev</title>
    <!-- Google Fonts & Font Awesome -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #f0f9ff 0%, #e6f4fe 50%, #ffffff 100%);
            position: relative;
            overflow-x: hidden;
            padding: 20px;
        }

        /* === SNOW EFFECT === */
        .snowflake {
            position: fixed;
            top: -10px;
            color: #ffffffcc;
            user-select: none;
            pointer-events: none;
            z-index: 9999;
            font-size: 1.2rem;
            animation: fall linear forwards;
            text-shadow: 0 0 5px rgba(0,160,255,0.3);
        }
        @keyframes fall {
            to {
                transform: translateY(100vh);
                opacity: 0.4;
            }
        }

        /* === GLASS CARD + MAIN LAYOUT === */
        .container {
            max-width: 1300px;
            margin: 0 auto;
            position: relative;
            z-index: 10;
        }

        /* header */
        .brand {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 30px;
            background: rgba(255,255,255,0.45);
            backdrop-filter: blur(12px);
            padding: 12px 28px;
            border-radius: 60px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            border: 1px solid rgba(255,255,255,0.6);
        }
        .logo h1 {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #0b2b5c, #1e88e5);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
        }
        .logo span {
            font-size: 0.85rem;
            font-weight: 500;
            color: #1e5a9e;
        }
        .user-greet {
            background: rgba(30,136,229,0.15);
            padding: 8px 18px;
            border-radius: 40px;
            font-weight: 500;
            color: #0a4b7a;
            backdrop-filter: blur(4px);
        }
        .btn-logout {
            background: none;
            border: none;
            margin-left: 12px;
            font-size: 1.2rem;
            cursor: pointer;
            color: #1e5a9e;
            transition: 0.2s;
        }
        .btn-logout:hover { color: #d32f2f; transform: scale(1.05);}

        /* TABS */
        .tabs {
            display: flex;
            gap: 18px;
            margin-bottom: 35px;
            flex-wrap: wrap;
        }
        .tab-btn {
            background: rgba(255,255,255,0.6);
            backdrop-filter: blur(8px);
            border: none;
            padding: 12px 32px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            color: #1f3b4c;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
            border: 1px solid rgba(255,255,255,0.7);
        }
        .tab-btn.active {
            background: #1976d2;
            color: white;
            box-shadow: 0 12px 20px -10px rgba(25,118,210,0.4);
            border-color: transparent;
        }
        .tab-btn:hover:not(.active) {
            background: rgba(25,118,210,0.2);
            transform: translateY(-2px);
        }

        /* panels với hiệu ứng fade/slide */
        .panel {
            display: none;
            opacity: 0;
            transform: translateY(12px);
            transition: opacity 0.35s ease, transform 0.35s ease;
        }
        .panel.active-panel {
            display: block;
            opacity: 1;
            transform: translateY(0);
        }

        /* Glass card */
        .glass-card {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(16px);
            border-radius: 42px;
            padding: 32px 28px;
            box-shadow: 0 25px 45px -12px rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.6);
            transition: all 0.3s;
        }
        .glass-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 30px 50px -15px rgba(0,80,120,0.25);
        }

        /* product grid */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 28px;
            margin-top: 20px;
        }
        .product-item {
            background: white;
            border-radius: 32px;
            padding: 24px;
            transition: all 0.25s;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            border: 1px solid rgba(0,0,0,0.05);
        }
        .product-item:hover {
            transform: scale(1.02);
            box-shadow: 0 20px 30px -10px rgba(0,100,200,0.2);
            border-color: #90caf9;
        }
        .product-icon {
            font-size: 3rem;
            color: #1976d2;
            margin-bottom: 16px;
        }
        .product-title {
            font-size: 1.7rem;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .product-desc {
            color: #4a627a;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }
        .price {
            font-weight: 800;
            font-size: 1.6rem;
            color: #0d47a1;
        }
        .btn-buy {
            background: #0b3b5e;
            border: none;
            padding: 12px 20px;
            border-radius: 40px;
            font-weight: 600;
            color: white;
            width: 100%;
            margin-top: 20px;
            cursor: pointer;
            transition: 0.2s;
            font-size: 1rem;
        }
        .btn-buy:hover {
            background: #1e88e5;
            transform: scale(0.98);
            box-shadow: 0 5px 12px rgba(0,120,210,0.4);
        }

        /* form */
        .form-group {
            margin-bottom: 22px;
        }
        .form-group label {
            font-weight: 500;
            display: block;
            margin-bottom: 8px;
            color: #0b2b44;
        }
        input, select {
            width: 100%;
            padding: 14px 18px;
            border-radius: 40px;
            border: 1px solid #cbd5e1;
            background: rgba(255,255,255,0.9);
            font-size: 1rem;
            transition: 0.2s;
        }
        input:focus {
            outline: none;
            border-color: #1976d2;
            box-shadow: 0 0 0 3px rgba(25,118,210,0.2);
        }
        .btn-primary {
            background: linear-gradient(95deg, #1976d2, #0b5fb0);
            border: none;
            padding: 14px;
            width: 100%;
            border-radius: 50px;
            font-weight: 700;
            font-size: 1rem;
            color: white;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-primary:hover { background: #0d47a1; transform: translateY(-2px);}
        .error-msg {
            color: #d32f2f;
            font-size: 0.75rem;
            margin-top: 6px;
        }
        .order-code {
            background: #e3f2fd;
            padding: 20px;
            border-radius: 32px;
            text-align: center;
            margin: 20px 0;
        }
        .order-code h3 { font-size: 1.8rem; letter-spacing: 2px; }
        .flex-btns {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 15px;
        }
        .secondary-btn {
            background: #f0f4f8;
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            font-weight: 500;
            cursor: pointer;
        }
        footer {
            margin-top: 70px;
            text-align: center;
            padding: 24px;
            background: rgba(255,255,255,0.5);
            backdrop-filter: blur(8px);
            border-radius: 50px;
        }
        .social-links a {
            margin: 0 12px;
            color: #0a4b7a;
            font-size: 1.5rem;
            transition: 0.2s;
            display: inline-block;
        }
        .social-links a:hover { color: #1976d2; transform: scale(1.1);}
        @media (max-width: 680px) {
            .brand { flex-direction: column; gap: 12px; text-align: center;}
            .glass-card { padding: 24px 18px;}
            .tab-btn { padding: 8px 20px; font-size: 0.85rem;}
        }
        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .toast-msg {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #1f2f3e;
            color: white;
            padding: 12px 24px;
            border-radius: 60px;
            z-index: 9999;
            font-weight: 500;
            backdrop-filter: blur(10px);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="brand">
        <div class="logo">
            <h1>⚡ VIP TOOL <span>Premium Suite</span></h1>
        </div>
        <div id="userArea" class="user-greet">
            <i class="fas fa-user-circle"></i> <span id="greetingText">Chưa đăng nhập</span>
            <button id="logoutBtn" class="btn-logout" style="display:none;"><i class="fas fa-sign-out-alt"></i></button>
        </div>
    </div>

    <div class="tabs">
        <button class="tab-btn active" data-tab="home">🏠 Cửa hàng</button>
        <button class="tab-btn" data-tab="loginTab">🔐 Đăng nhập</button>
        <button class="tab-btn" data-tab="registerTab">📝 Đăng ký</button>
        <button class="tab-btn" data-tab="paymentFlow" id="paymentFlowTab" style="display:none;">💳 Thanh toán</button>
    </div>

    <!-- PANEL: HOME (SẢN PHẨM) -->
    <div id="homePanel" class="panel active-panel">
        <div class="glass-card">
            <h2 style="margin-bottom: 10px;">🔥 Tool VIP Cao Cấp</h2>
            <p style="margin-bottom: 20px;">Chọn công cụ bạn muốn mua - Thanh toán 0đ tặng mã đơn hàng</p>
            <div class="products-grid" id="productsGrid"></div>
        </div>
    </div>

    <!-- PANEL: LOGIN -->
    <div id="loginTabPanel" class="panel">
        <div class="glass-card">
            <h2>Đăng nhập</h2>
            <form id="loginForm">
                <div class="form-group"><label>Tên đăng nhập</label><input type="text" id="loginUsername" placeholder="Username" required></div>
                <div class="form-group"><label>Mật khẩu</label><input type="password" id="loginPassword" placeholder="Password" required></div>
                <button type="submit" class="btn-primary">Đăng nhập</button>
                <div id="loginError" class="error-msg" style="margin-top:12px;"></div>
            </form>
        </div>
    </div>

    <!-- PANEL: REGISTER -->
    <div id="registerTabPanel" class="panel">
        <div class="glass-card">
            <h2>Tạo tài khoản mới</h2>
            <form id="registerForm">
                <div class="form-group"><label>Username</label><input type="text" id="regUser" required></div>
                <div class="form-group"><label>Password</label><input type="password" id="regPass" required></div>
                <div class="form-group"><label>Xác nhận mật khẩu</label><input type="password" id="regConfirm" required></div>
                <button type="submit" class="btn-primary">Đăng ký</button>
                <div id="regError" class="error-msg"></div>
            </form>
        </div>
    </div>

    <!-- PANEL: THANH TOÁN FLOW (chọn sp + form) -->
    <div id="paymentFlowPanel" class="panel">
        <div class="glass-card" id="paymentDynamicContent">
            <!-- step 1: chọn sản phẩm hoặc step 2: nhập thông tin -->
        </div>
    </div>
</div>

<footer>
    <div>© 2025 Thanh Duong Dev - Premium Tools Store</div>
    <div class="social-links" style="margin-top:12px;">
        <a href="https://youtube.com/@anhladuong.00?si=CR6pxtVNUwzfqwDs" target="_blank"><i class="fab fa-youtube"></i> YouTube</a>
        <a href="https://www.facebook.com/share/1Ai7vvVnty/" target="_blank"><i class="fab fa-facebook"></i> Facebook</a>
    </div>
</footer>

<script>
    // ---- DATA & STORAGE ----
    let users = JSON.parse(localStorage.getItem('vip_users')) || [];
    let currentUser = localStorage.getItem('vip_currentUser') || null;
    // Products
    const products = [
        { id: 1, name: "VIP Auto Tool", desc: "Tự động hóa đỉnh cao", price: "0₫", icon: "fa-cogs" },
        { id: 2, name: "Data Scraper Pro", desc: "Thu thập dữ liệu thông minh", price: "0₫", icon: "fa-database" },
        { id: 3, name: "AI Content VIP", desc: "Tạo nội dung bằng AI", price: "0₫", icon: "fa-robot" }
    ];
    let selectedProduct = null;      // lưu product đang chọn để thanh toán
    let lastOrderCode = null;

    // Helper: Lưu user
    function saveUsers() { localStorage.setItem('vip_users', JSON.stringify(users)); }
    function setCurrentUser(user) {
        currentUser = user;
        if(user) localStorage.setItem('vip_currentUser', user);
        else localStorage.removeItem('vip_currentUser');
        updateUIBasedOnAuth();
    }

    // Cập nhật giao diện theo auth
    function updateUIBasedOnAuth() {
        const greetSpan = document.getElementById('greetingText');
        const logoutBtn = document.getElementById('logoutBtn');
        if(currentUser) {
            greetSpan.innerHTML = `<i class="fas fa-check-circle"></i> ${currentUser}`;
            logoutBtn.style.display = 'inline-block';
        } else {
            greetSpan.innerHTML = 'Chưa đăng nhập';
            logoutBtn.style.display = 'none';
            // reset lại thanh toán nếu đang mở tab thanh toán nhưng chưa đăng nhập
            if(document.querySelector('.tab-btn.active')?.dataset.tab === 'paymentFlow') {
                // chuyển về home
                switchTab('home');
            }
        }
        // hiển thị lại sản phẩm
        renderProducts();
    }

    function renderProducts() {
        const grid = document.getElementById('productsGrid');
        if(!grid) return;
        grid.innerHTML = '';
        products.forEach(prod => {
            const card = document.createElement('div');
            card.className = 'product-item';
            card.innerHTML = `
                <div class="product-icon"><i class="fas ${prod.icon}"></i></div>
                <div class="product-title">${prod.name}</div>
                <div class="product-desc">${prod.desc}</div>
                <div class="price">${prod.price}</div>
                <button class="btn-buy" data-id="${prod.id}">Mua ngay</button>
            `;
            grid.appendChild(card);
        });
        document.querySelectorAll('.btn-buy').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const id = parseInt(btn.dataset.id);
                const product = products.find(p => p.id === id);
                if(!currentUser) {
                    showToast('⚠️ Vui lòng đăng nhập trước khi mua hàng!');
                    switchTab('loginTab');
                    return;
                }
                if(product) {
                    selectedProduct = product;
                    // chuyển đến flow thanh toán - bước chọn sản phẩm (hiện form xác nhận sp)
                    showPaymentStepProduct();
                    switchTab('paymentFlow');
                }
            });
        });
    }

    // Thanh toán flow: 2 step (hiện sp đã chọn, sau đó form)
    function showPaymentStepProduct() {
        const container = document.getElementById('paymentDynamicContent');
        if(!selectedProduct) {
            container.innerHTML = `<p>Chưa có sản phẩm nào được chọn. Vui lòng quay lại shop.</p><button class="btn-primary" id="backToShop">Về cửa hàng</button>`;
            document.getElementById('backToShop')?.addEventListener('click', () => switchTab('home'));
            return;
        }
        container.innerHTML = `
            <h3>✅ Sản phẩm: ${selectedProduct.name}</h3>
            <p>Giá: ${selectedProduct.price} (Miễn phí hoàn toàn)</p>
            <button id="continueToPayment" class="btn-primary" style="margin-top:15px;">Tiếp tục thanh toán</button>
            <button id="cancelPay" class="secondary-btn" style="margin-top:10px;">Hủy</button>
        `;
        document.getElementById('continueToPayment')?.addEventListener('click', () => showPaymentForm());
        document.getElementById('cancelPay')?.addEventListener('click', () => {
            selectedProduct = null;
            switchTab('home');
        });
    }

    function showPaymentForm() {
        const container = document.getElementById('paymentDynamicContent');
        container.innerHTML = `
            <h3>📝 Thông tin thanh toán</h3>
            <p>Sản phẩm: <strong>${selectedProduct.name}</strong> - Tổng tiền: 0₫</p>
            <form id="paymentForm">
                <div class="form-group"><label>Họ tên</label><input type="text" id="fullName" placeholder="Nguyễn Văn A" required></div>
                <div class="form-group"><label>Số điện thoại</label><input type="tel" id="phone" placeholder="0912345678" required></div>
                <button type="submit" class="btn-primary">Xác nhận thanh toán 0đ</button>
            </form>
            <button id="backStep" class="secondary-btn" style="margin-top:12px;">Quay lại</button>
        `;
        document.getElementById('paymentForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const name = document.getElementById('fullName').value.trim();
            const phone = document.getElementById('phone').value.trim();
            if(!name || !phone) { showToast('Vui lòng nhập đầy đủ thông tin'); return; }
            // Tạo mã đơn hàng ngẫu nhiên: TD + 6 số
            const randomCode = 'TD' + Math.floor(100000 + Math.random() * 900000);
            lastOrderCode = randomCode;
            // Lưu order vào localStorage (optional)
            const orders = JSON.parse(localStorage.getItem('vip_orders')) || [];
            orders.push({ orderCode: randomCode, product: selectedProduct.name, user: currentUser, fullname: name, phone, date: new Date().toISOString() });
            localStorage.setItem('vip_orders', JSON.stringify(orders));
            // Hiển thị kết quả
            showOrderResult(randomCode);
        });
        document.getElementById('backStep')?.addEventListener('click', () => showPaymentStepProduct());
    }

    function showOrderResult(orderCode) {
        const container = document.getElementById('paymentDynamicContent');
        container.innerHTML = `
            <div class="order-code">
                <i class="fas fa-receipt" style="font-size:3rem; color:#1976d2;"></i>
                <h3>Mã đơn hàng của bạn</h3>
                <h2 style="background:#ffffffaa; padding:12px; border-radius:40px; letter-spacing:2px;">${orderCode}</h2>
                <div class="flex-btns">
                    <button id="copyOrderBtn" class="secondary-btn"><i class="fas fa-copy"></i> Copy mã</button>
                    <button id="screenshotGuideBtn" class="secondary-btn"><i class="fas fa-camera"></i> Chụp màn hình gửi admin</button>
                </div>
                <p style="margin-top:18px;"><i class="fas fa-info-circle"></i> Hướng dẫn: Bấm "Chụp màn hình" lưu ảnh và gửi qua Facebook / YouTube admin để nhận tool VIP.</p>
                <button id="newPurchase" class="btn-primary" style="margin-top:20px;">Mua thêm sản phẩm khác</button>
            </div>
        `;
        document.getElementById('copyOrderBtn')?.addEventListener('click', () => {
            navigator.clipboard.writeText(orderCode);
            showToast('Đã copy mã đơn: ' + orderCode);
        });
        document.getElementById('screenshotGuideBtn')?.addEventListener('click', () => {
            showToast('📸 Vui lòng chụp màn hình mã đơn, liên hệ admin qua YouTube/Facebook để nhận tool VIP ngay!');
        });
        document.getElementById('newPurchase')?.addEventListener('click', () => {
            selectedProduct = null;
            switchTab('home');
        });
        // Xóa selectedProduct sau khi hoàn tất (không cho mua lại trùng)
        // nhưng giữ nguyên để mua mới
    }

    // ----- Auth Logic -----
    function register(user, pass) {
        if(users.find(u => u.username === user)) return { success: false, msg: 'Tên đăng nhập đã tồn tại!' };
        if(pass.length < 3) return { success: false, msg: 'Mật khẩu phải có ít nhất 3 ký tự' };
        users.push({ username: user, password: pass });
        saveUsers();
        return { success: true, msg: 'Đăng ký thành công! Hãy đăng nhập.' };
    }
    function login(user, pass) {
        const exist = users.find(u => u.username === user && u.password === pass);
        if(exist) return { success: true };
        return { success: false, msg: 'Sai tên đăng nhập hoặc mật khẩu' };
    }

    // ----- UI: Tabs -----
    function switchTab(tabId) {
        // ẩn hết panel
        document.querySelectorAll('.panel').forEach(panel => panel.classList.remove('active-panel'));
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        let activePanel = null;
        if(tabId === 'home') activePanel = document.getElementById('homePanel');
        else if(tabId === 'loginTab') activePanel = document.getElementById('loginTabPanel');
        else if(tabId === 'registerTab') activePanel = document.getElementById('registerTabPanel');
        else if(tabId === 'paymentFlow') activePanel = document.getElementById('paymentFlowPanel');
        if(activePanel) activePanel.classList.add('active-panel');
        // active tab button
        const targetBtn = Array.from(document.querySelectorAll('.tab-btn')).find(btn => btn.dataset.tab === tabId);
        if(targetBtn) targetBtn.classList.add('active');
        // Nếu thanh toán và chưa đăng nhập, đẩy về login
        if(tabId === 'paymentFlow' && !currentUser) {
            showToast('Vui lòng đăng nhập để thanh toán');
            switchTab('loginTab');
            return;
        }
        // Nếu tab thanh toán nhưng chưa chọn sản phẩm
        if(tabId === 'paymentFlow' && !selectedProduct) {
            showPaymentStepProduct();
        } else if(tabId === 'paymentFlow' && selectedProduct) {
            // nếu đang có selected, hiển thị step tùy theo nội dung hiện tại? Gọi refresh
            const container = document.getElementById('paymentDynamicContent');
            if(container && (!container.innerHTML.includes('Mã đơn') && !container.innerHTML.includes('Thông tin thanh toán') && !container.innerHTML.includes('Sản phẩm:'))) {
                showPaymentStepProduct();
            }
        }
    }

    function showToast(msg) {
        let toast = document.createElement('div');
        toast.className = 'toast-msg';
        toast.innerText = msg;
        document.body.appendChild(toast);
        setTimeout(() => { toast.remove(); }, 2500);
    }

    // ---- EVENT LISTENERS & INIT ----
    document.addEventListener('DOMContentLoaded', () => {
        renderProducts();
        updateUIBasedOnAuth();

        // Tab click
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const tab = btn.dataset.tab;
                switchTab(tab);
            });
        });

        // Login form
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const user = document.getElementById('loginUsername').value.trim();
            const pass = document.getElementById('loginPassword').value;
            const res = login(user, pass);
            if(res.success) {
                setCurrentUser(user);
                showToast(`Chào mừng ${user}`);
                switchTab('home');
                document.getElementById('loginError').innerText = '';
            } else {
                document.getElementById('loginError').innerText = res.msg;
            }
        });

        // Register form
        document.getElementById('registerForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const user = document.getElementById('regUser').value.trim();
            const pass = document.getElementById('regPass').value;
            const confirm = document.getElementById('regConfirm').value;
            if(pass !== confirm) {
                document.getElementById('regError').innerText = 'Mật khẩu xác nhận không khớp';
                return;
            }
            const regRes = register(user, pass);
            if(regRes.success) {
                showToast(regRes.msg);
                switchTab('loginTab');
                document.getElementById('regError').innerText = '';
                document.getElementById('registerForm').reset();
            } else {
                document.getElementById('regError').innerText = regRes.msg;
            }
        });

        document.getElementById('logoutBtn').addEventListener('click', () => {
            setCurrentUser(null);
            selectedProduct = null;
            showToast('Đã đăng xuất');
            switchTab('home');
        });
    });

    // SNOW EFFECT (tuyết rơi)
    function createSnow() {
        const snowContainer = document.createElement('div');
        snowContainer.style.position = 'fixed';
        snowContainer.style.top = '0';
        snowContainer.style.left = '0';
        snowContainer.style.width = '100%';
        snowContainer.style.height = '100%';
        snowContainer.style.pointerEvents = 'none';
        snowContainer.style.zIndex = '99999';
        document.body.appendChild(snowContainer);
        setInterval(() => {
            let flake = document.createElement('div');
            flake.classList.add('snowflake');
            flake.innerHTML = '❄️';
            flake.style.left = Math.random() * window.innerWidth + 'px';
            flake.style.fontSize = 12 + Math.random() * 14 + 'px';
            flake.style.animationDuration = 3 + Math.random() * 5 + 's';
            flake.style.opacity = 0.5 + Math.random() * 0.5;
            snowContainer.appendChild(flake);
            setTimeout(() => { if(flake) flake.remove(); }, 8000);
        }, 300);
    }
    createSnow();
</script>
</body>
</html>
